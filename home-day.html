<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fraeyed Reality Home Day</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }
    input, button, select {
      font-size: 16px;
      margin: 5px;
      padding: 5px;
    }
    iframe {
      border: none;
      margin-top: 20px;
    }
    #formContainer {
      margin-top: 30px;
    }
  </style>
</head>
<body>

<h1>Fraeyed Reality<br>Home Cam - Daytime</h1>

<p>Enter a username Fraeymark will know you by once, then watch the video and submit anomalies.</p>

<label for="username">Username:</label>
<input type="text" id="username" placeholder="Your name here">
<button onclick="setUsername()">Set Username</button>

<div id="videoContainer">
  <iframe width="800" height="450"
    src="https://www.youtube.com/embed/Pz8pnsKJ65c"
    title="YouTube video player"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>

<div id="formContainer">
  <h3>Report an anomaly</h3>
  <label for="time">Time (:is not important):</label>
  <input type="text" id="time" placeholder="e.g. 2:15, 2.15, or 215">

  <label for="anomaly">Anomaly Type:</label>
  <select id="anomaly">
    <option value="" disabled selected>Select anomaly type</option>
    <option value="Face in window">Face in window</option>
    <option value="Hand through grate">Hand through grate</option>
    <option value="Open locker">Open locker</option>
    <option value="Crane moves">Crane moves</option>
    <option value="Falling machine">Falling machine</option>
    <option value="Other">Other</option>
  </select>

  <button onclick="submitAnomaly()">Submit</button>
</div>
<script>
let twitchUsername = "";
const gameName = "Home – Day"; // Change this for each game page  

// Set username once
function setUsername() {
  const nameInput = document.getElementById('username').value.trim();
  if (!nameInput) {
    alert("Please enter your Twitch username first.");
    return;
  }
  twitchUsername = nameInput;
  alert(`Username saved as: ${twitchUsername}`);
}

// Submit anomaly to Google Sheets
function submitAnomaly() {
  if (!twitchUsername) {
    alert("Enter your username first.");
    return;
  }

  const time = document.getElementById('time').value.trim();
  const anomaly = document.getElementById('anomaly').value.trim();

  if (!time || !anomaly) {
    alert("Please fill out both time and anomaly type.");
    return;
  }

  // Your Apps Script Web App URL
const scriptURL = "https://script.google.com/macros/s/AKfycbxiZrluGubgooN9gAaxe-kLr-UnHLtQq_ZnNGBVRfZUlqeGx1PV3TM9IvsS8b72MM-8/exec";
  fetch(scriptURL, {
    method: "POST",
    body: new URLSearchParams({
      username: twitchUsername,
      time: time,
      anomaly: anomaly,
      game: gameName
    })
  })
  .then(response => response.text())
  .then(result => {
    console.log(result);
    document.getElementById('time').value = "";
    document.getElementById('anomaly').value = "";
    alert("Anomaly submitted!");
  })
  .catch(error => {
    console.error(error);
    alert("Error submitting anomaly. Try again.");
  });
}
</script>

</body>

</html>
